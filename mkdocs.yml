site_name: msb_rename_utility
site_description: Clean-room rename pipeline — web UI + documented op library.
theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.suggest
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - User Guide:
      - Overview: user/index.md
      - Recipes:
          - Rename photos by date: user/recipes/photos-by-date.md
          - Zero-pad episode numbers: user/recipes/pad-episodes.md
          - Clean up a messy download folder: user/recipes/clean-downloads.md
          - Normalize extensions: user/recipes/normalize-extensions.md
  - Developer Reference:
      - Getting started: dev/getting-started.md
      - Concepts:
          - Pipeline model: dev/concepts/pipeline.md
          - Preview vs apply: dev/concepts/preview-vs-apply.md
          - Collisions: dev/concepts/collisions.md
          - Share links: dev/concepts/share-links.md
          - File pickers: dev/concepts/file-pickers.md
      - Operations:
          - case: dev/ops/case.md
          - replace: dev/ops/replace.md
          - regex: dev/ops/regex.md
          - insert: dev/ops/insert.md
          - numbering: dev/ops/numbering.md
          - pad: dev/ops/pad.md
          - trim: dev/ops/trim.md
          - remove_at: dev/ops/remove_at.md
          - change_ext: dev/ops/change_ext.md
          - date_from_mtime: dev/ops/date_from_mtime.md
