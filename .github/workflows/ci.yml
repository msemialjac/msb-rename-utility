name: CI

on:
  push:
    branches: [main]
  pull_request:

# No user-controlled inputs (issue titles, PR bodies, commit messages, etc.)
# are used in any run: step, so command-injection isn't reachable here.
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m pytest -q

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install mkdocs-material
      - run: mkdocs build --strict
